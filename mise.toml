# mise dev toolchain — https://mise.jdx.dev
#
# Node stays governed by .nvmrc and pnpm by the `packageManager` field in
# package.json (corepack); mise only provisions the commit/release tooling so a
# fresh clone is one `mise install` away from a working setup.

[tools]
hk = "1.48.0"                       # git hook manager — https://hk.jdx.dev
pkl = "0.31.1"                       # config language hk.pkl is written in
"github:convco/convco" = "0.6.4"    # conventional-commit linter + version bumps
git-cliff = "2.13.1"                # changelog generator — https://git-cliff.org

[hooks]
# Install hk's git hooks automatically after tools are provisioned. mise runs
# `postinstall` even when every tool is already present, so `mise install`
# always (re)wires `.git/hooks` — no separate `hk install` step to remember.
postinstall = "hk install"
