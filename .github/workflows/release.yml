name: Release

# Publishes a GitHub release whenever a version tag is pushed. Release notes are
# rendered from Conventional Commits with git-cliff (see cliff.toml). Cut a
# release by merging the automated release PR (see release-pr.yml) and then
# tagging the merge commit, e.g. `git tag v1.2.0 && git push origin v1.2.0`.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  HK: "0" # disable hk git hooks during CI git operations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for git-cliff

      - name: Provision release tooling
        uses: jdx/mise-action@v2

      - name: Render release notes
        run: git-cliff --config cliff.toml --latest --strip header --output RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
