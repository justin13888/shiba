name: Publish Container

# Builds the sync-server image and pushes it to GHCR on every version tag.
#
# Auth uses the built-in GITHUB_TOKEN (no configured secret) — GHCR trusts the
# workflow through `packages: write`. This is the trusted-publishing path: zero
# stored credentials. Images are multi-arch (linux/amd64 + linux/arm64); the
# arm64 leg is built under QEMU emulation.
#
# workflow_dispatch on a branch does a push under a branch-named tag (a safe
# dry run); dispatch on a tag re-publishes that version.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/shiba-server
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=branch
            type=sha,format=short
          labels: |
            org.opencontainers.image.title=Shiba sync server
            org.opencontainers.image.description=End-to-end encrypted sync server for the Shiba tab manager
            org.opencontainers.image.licenses=AGPL-3.0-only

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
