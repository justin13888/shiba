# git-cliff configuration — https://git-cliff.org
#
# Generates CHANGELOG.md from Conventional Commits. Used both to seed the
# changelog and by the release workflow (.github/workflows/release.yml) to
# render notes for each tag.

[changelog]
header = """
# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com), this
project adheres to [Semantic Versioning](https://semver.org), and commits follow
[Conventional Commits](https://www.conventionalcommits.org).\n
"""
# Tera template rendered once per release section.
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/justin13888/shiba/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
# Drop commits that predate the conventional-commits convention so the seed
# stays readable.
filter_unconventional = true
filter_commits = false
split_commits = false
protect_breaking_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "newest"

# Link issue/PR references like `(#3)` to GitHub.
commit_preprocessors = [
  { pattern = '\(#([0-9]+)\)', replace = "([#${1}](https://github.com/justin13888/shiba/issues/${1}))" },
]

# Ordered groups; the HTML-comment prefix controls section order and is stripped
# from the rendered heading via `striptags`.
commit_parsers = [
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)|^build\\(deps\\)", group = "<!-- 8 -->Dependencies" },
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactoring" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^build", group = "<!-- 6 -->Build System" },
  { message = "^ci", group = "<!-- 7 -->CI" },
  { message = "^style", group = "<!-- 9 -->Styling" },
  { message = "^chore", group = "<!-- 9 -->Miscellaneous" },
  { message = ".*", group = "<!-- 9 -->Miscellaneous" },
]
